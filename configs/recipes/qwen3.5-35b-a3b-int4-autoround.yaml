# Recipe: Qwen3.5-35B-A3B-INT4-AutoRound (solo mode, baseline)
#
# Matches albond's 122B baseline methodology for apples-to-apples comparison:
#   - Intel INT4 AutoRound checkpoint
#   - FlashInfer attention backend
#   - No speculative decoding (added in Phase 3)
#   - No hybrid FP8 layers (added in Phase 4)
#   - Prefix caching OFF (DeltaNet hybrid attention conflict, same issue as 122B)

recipe_version: "1"
name: Qwen3.5-35B-A3B-INT4-AutoRound
description: vLLM serving Intel/Qwen3.5-35B-A3B-int4-AutoRound on single DGX Spark

model: Intel/Qwen3.5-35B-A3B-int4-AutoRound

solo_only: true
container: vllm-node-tf5

build_args:
  - --tf5

mods:
  - mods/fix-qwen3.5-autoround
  - mods/fix-qwen3.5-chat-template

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.90
  max_model_len: 262144
  max_num_batched_tokens: 16384

env:
  VLLM_MARLIN_USE_ATOMIC_ADD: 1

command: |
  vllm serve Intel/Qwen3.5-35B-A3B-int4-AutoRound \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --port {port} \
    --host {host} \
    --served-model-name qwen \
    --load-format fastsafetensors \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_xml \
    --reasoning-parser qwen3 \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --trust-remote-code \
    --chat-template unsloth.jinja \
    --attention-backend FLASHINFER \
    -tp {tensor_parallel}
